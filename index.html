<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Садик на свободном</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #222;
      --muted: #667085;
      --primary: #4f46e5;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --green: #059669;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 220px);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(229, 231, 235, 0.8);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .contacts {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .contact-link:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .description {
      margin: 0 0 16px;
      font-size: 16px;
      color: var(--muted);
    }

    select {
      padding: 11px 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      min-width: 220px;
      outline: none;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(229, 231, 235, 0.9);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 35px rgba(15, 23, 42, 0.12);
    }

    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
      background: #f3f4f6;
    }

    .card-body {
      padding: 15px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .category {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      line-height: 1.45;
      margin-bottom: 12px;
      color: #374151;
    }

    .price {
      font-weight: bold;
      font-size: 16px;
      color: var(--green);
    }

    .hidden { display: none; }

    .error {
      padding: 16px;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 12px;
      color: #856404;
      margin-top: 16px;
      display: none;
    }

    footer {
      margin-top: 28px;
      padding: 18px 0 6px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      white-space: pre-line;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .footer-links a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      h1 { font-size: 24px; }
      select { width: 100%; }
      .contact-link {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <h1>Садик на свободном</h1>

      <div class="contacts">
        <a class="contact-link" href="https://max.ru/join/zBUsfrz8tTYq5GkbVPEQCq9rHifbwbJgb22Gc0aA3NA" target="_blank">Группа в MAX</a>
        <a class="contact-link" href="tel:+89608546007">89608546007 Екатерина</a>
        <a class="contact-link" href="tel:+89648863510">89648863510 Татьяна</a>
      </div>
    </header>

    <div class="toolbar">
      <select id="categoryFilter">
        <option value="all">Все категории</option>
      </select>
    </div>

    <p class="description">Совместная закупка и продажа растений (Лилий, тюльпанов и др.)</p>

    <div id="catalog" class="cards"></div>
    <div id="error" class="error"></div>

    <footer>
Контакты г.Астрахань Новороссийская 37 с 9 до 19 (уточните)
Телефон 8908546007
    </footer>
  </div>

  <script>
    function renderCards(products) {
      const catalog = document.getElementById('catalog');
      catalog.innerHTML = '';

      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.category = product.category;

        card.innerHTML = `
          <img src="${product.photoUrl}" alt="${product.name}">
          <div class="card-body">
            <h2>${product.name}</h2>
            <div class="category">${product.category}</div>
            <div class="desc">${product.description}</div>
            <div class="price">${product.price} ₽</div>
          </div>
        `;

        catalog.appendChild(card);
      });
    }

    function renderCategories(products) {
      const select = document.getElementById('categoryFilter');
      const categories = [...new Set(products.map(item => item.category))];

      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        select.appendChild(option);
      });
    }

    function applyFilter() {
      const selected = document.getElementById('categoryFilter').value;
      const cards = document.querySelectorAll('.card');

      cards.forEach(card => {
        const match = selected === 'all' || card.dataset.category === selected;
        card.classList.toggle('hidden', !match);
      });
    }

    async function loadCatalog() {
      try {
        const res = await fetch('./catalog.json?v=' + Date.now());
        if (!res.ok) throw new Error('Не удалось загрузить catalog.json');

        const products = await res.json();
        renderCategories(products);
        renderCards(products);
        applyFilter();
        document.getElementById('categoryFilter').addEventListener('change', applyFilter);
      } catch (err) {
        const errorBox = document.getElementById('error');
        errorBox.style.display = 'block';
        errorBox.textContent = 'Ошибка: ' + err.message;
      }
    }

    loadCatalog();
  </script>
</body>
</html>
